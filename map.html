<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Atlas électoral militant</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>/*__CSS__*/</style>
</head>
<body>
<div id="map"></div>
<div id="top" class="panel">
  <button id="back" disabled title="Remonter">⬅</button>
  <button id="pastoggle" aria-expanded="false" title="Indicateurs">📊</button>
  <span id="fil"></span>
  <button id="exportbtn" title="Exporter toutes les données du panneau de la zone sélectionnée (JSON complet)">⬇️ Export</button>
  <button id="advtoggle" aria-pressed="false" title="Affichage avancé : indicateurs et comparaison de scrutins">⚙️ Avancé</button>
  <input id="search" list="zones" autocomplete="off"
         placeholder="🔎 Rechercher une zone (région, département, commune)…"/>
  <datalist id="zones"></datalist>
  <span id="loading" class="hint"></span>
</div>
<div id="pastilles" class="panel"><span id="pairgroup"
    title="Choisissez deux élections à comparer (de A à B). Ce choix met à jour les indicateurs de comparaison (voix LFI conservées, évolution de la participation, voix perdues à gauche) et l'élection affichée pour Vote LFI / Participation / RN / Gauche.">
    <span id="pairlab">⚖️ Comparaison</span>
    <span id="pairsel"><select id="selA"></select><span class="arr">→</span><select id="selB"></select></span>
    </span></div>
<div id="subtoggle" class="panel">
  <span class="chip on" data-m="bv">🗳️ Bureaux de vote</span>
  <span class="chip" data-m="iris">🏙️ Quartiers IRIS</span>
</div>
<div id="info" class="panel"></div>
<div id="legend" class="panel">
  <div id="legtitle" style="font-weight:600;color:#5b2a86"></div>
  <div style="margin-top:4px"><span style="color:#2166ac">– faible</span>
    <span class="bar"></span><span style="color:#b2182b">élevé +</span></div>
  <div class="hint">couleur = rang parmi les zones affichées (bleu = plus faible, rouge = plus élevé) · zoomez ou cliquez pour descendre</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>/*__JS__*/</script>
</body>
</html>
