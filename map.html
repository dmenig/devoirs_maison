<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Atlas électoral militant</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,sans-serif}
  #map{position:absolute;inset:0}
  .panel{position:absolute;z-index:1000;background:#fff;border-radius:10px;
         box-shadow:0 1px 8px rgba(0,0,0,.25);padding:7px 10px;font-size:13px}
  #top{top:10px;left:52px;right:10px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  #fil{font-weight:700;color:#5b2a86}
  .crumb{cursor:pointer} .crumb:hover{text-decoration:underline}
  #back{cursor:pointer;border:none;background:#5b2a86;color:#fff;border-radius:7px;padding:5px 10px}
  #back:disabled{opacity:.3;cursor:default}
  #search{min-width:220px;padding:5px 7px;border:1px solid #ccc;border-radius:7px;font-size:13px}
  #pastilles{top:54px;left:52px;display:flex;gap:6px;flex-wrap:wrap;padding:6px 8px}
  #pairsel{display:flex;gap:4px;align-items:center;margin-right:6px;font-size:12px;font-weight:700;color:#5b2a86}
  #pairsel select{font-weight:400;font-size:12px;padding:2px 4px;border:1px solid #ccc;border-radius:7px;background:#fff;color:#333;cursor:pointer}
  #pairsel .arr{color:#aaa;font-weight:700}
  .chip{cursor:pointer;border:1px solid #ccc;border-radius:14px;padding:3px 10px;background:#fff;font-size:12px}
  .chip.on{background:#5b2a86;color:#fff;border-color:#5b2a86}
  #info{top:100px;right:10px;width:268px;max-height:82vh;overflow:auto;display:none;padding:12px 14px}
  #info .t{font-weight:800;font-size:16px;color:#5b2a86;margin-bottom:2px}
  #info .lead{font-size:11px;color:#999;text-transform:uppercase;letter-spacing:.04em}
  #info .head{font-size:30px;font-weight:800;color:#cf2e5b;line-height:1;margin:2px 0 8px}
  #info .head small{font-size:13px;color:#999;font-weight:600}
  #info .sec{font-size:10.5px;color:#888;text-transform:uppercase;letter-spacing:.05em;
             margin:11px 0 5px;border-top:1px solid #eee;padding-top:7px}
  #info .row{display:flex;justify-content:space-between;gap:8px;margin:4px 0;font-size:13px}
  #info .row span{color:#555} #info .row b{color:#222;font-variant-numeric:tabular-nums}
  #info .bar{margin:3px 0 7px;background:#f0f0f3;border-radius:5px;height:8px;overflow:hidden}
  #info .bar i{display:block;height:100%;border-radius:5px}
  #info .lab{display:flex;justify-content:space-between;font-size:12.5px;color:#444;margin-top:6px}
  #info .lab b{font-variant-numeric:tabular-nums;color:#222}
  #info .trend{display:flex;gap:5px;align-items:flex-end;height:54px;margin-top:4px}
  #info .tcol{flex:1;text-align:center;font-size:10px;color:#888}
  #info .tbarwrap{height:38px;display:flex;align-items:flex-end;justify-content:center}
  #info .tbar{width:60%;background:#cf2e5b;border-radius:3px 3px 0 0;min-height:2px}
  #info .tv{font-weight:700;color:#cf2e5b;font-size:11px}
  #info .bal{display:flex;height:22px;border-radius:6px;overflow:hidden;font-size:11px;color:#fff;font-weight:700}
  #info .bal .bg{background:#cf2e5b;display:flex;align-items:center;justify-content:center;min-width:30px}
  #info .bal .bn{background:#3b6ea5;display:flex;align-items:center;justify-content:center;min-width:30px}
  #info .exp .exph{cursor:pointer}
  #info .exp .exph .ico{float:right;color:#b39ddb;font-size:10px;font-weight:600;margin-top:3px}
  #info .exp.open .exph .ico::after{content:" ▴"}
  #info .exp .det,#info .det2{display:none;font-size:11.5px;color:#5a5a5a;line-height:1.5;
       background:#faf7fd;border-left:3px solid #d9c7ec;padding:7px 9px;border-radius:0 6px 6px 0;margin:6px 0 2px}
  #info .exp.open .det,#info .exp.open .det2{display:block}
  #info .rwrap{overflow-x:auto;margin-top:2px}
  #info table.recompo{border-collapse:collapse;font-size:10px;width:100%;font-variant-numeric:tabular-nums}
  #info table.recompo th,#info table.recompo td{padding:1px 3px;text-align:right;white-space:nowrap}
  #info table.recompo td.sc{text-align:left;color:#777}
  #info table.recompo tbody tr:nth-child(odd){background:#faf7fd}
  #info .act{background:#2d1640;color:#f3ecfa;border-radius:8px;padding:9px 11px;margin:12px 0 2px}
  #info .act .ah{font-weight:800;font-size:11.5px;letter-spacing:.04em;text-transform:uppercase;color:#d9c7ec;margin-bottom:6px}
  #info .act ul{margin:0;padding-left:16px} #info .act li{margin:5px 0;line-height:1.45}
  #info .act b{color:#fff}
  #info .act .leg{margin-top:8px;font-size:11px;line-height:1.7;border-top:1px solid #4a2d63;padding-top:7px}
  #info .act .dot{display:inline-block;width:9px;height:9px;border-radius:2px;margin-right:5px;vertical-align:middle}
  #info .act .inv{margin-top:8px;font-size:11px;font-style:italic;color:#c9b6e0;line-height:1.5}
  #subtoggle{top:54px;right:10px;display:none;gap:6px}
  #legend{bottom:14px;right:10px}
  .bar{display:inline-block;width:130px;height:10px;border-radius:3px;vertical-align:middle;
       background:linear-gradient(to right,#2166ac,#67a9cf,#f7f7f7,#ef8a62,#b2182b)}
  .hint{color:#777;font-size:11px}
</style>
</head>
<body>
<div id="map"></div>
<div id="top" class="panel">
  <button id="back" disabled title="Remonter">⬅</button>
  <span id="fil"></span>
  <input id="search" list="communes" placeholder="🔎 Rechercher une commune…"/>
  <datalist id="communes"></datalist>
  <span id="loading" class="hint"></span>
</div>
<div id="pastilles" class="panel"><span id="pairsel" title="Choisir les deux scrutins comparés">⚖️
    <select id="selA"></select><span class="arr">→</span><select id="selB"></select></span></div>
<div id="subtoggle" class="panel">
  <span class="chip on" data-m="bv">🗳️ Bureaux de vote</span>
  <span class="chip" data-m="iris">🏙️ Quartiers IRIS</span>
</div>
<div id="info" class="panel"></div>
<div id="legend" class="panel">
  <div id="legtitle" style="font-weight:600;color:#5b2a86"></div>
  <div style="margin-top:4px"><span style="color:#2166ac">– faible</span>
    <span class="bar"></span><span style="color:#b2182b">élevé +</span></div>
  <div class="hint">couleur = rang parmi les zones affichées (bleu = plus faible, rouge = plus élevé) · zoomez ou cliquez pour descendre</div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const BASE="__BASE__";
const FRANCE=[[41.3,-5.2],[51.2,9.7]];
const SCR=[["P22","Présid. 2022"],["E24","Europ. 2024"],["L24","Légis. 2024"],["M26","Munic. 2026"]];
const MET=[["part","Particip."],["lfi","LFI"],["gauche","Gauche"],["rn","RN"],["em","Macron"],["lr","LR"]];
const PAST=[["lfi_E24","Vote LFI","%"],["part_E24","Participation","%"],["rn_E24","Vote RN","%"],
            ["gauche_E24","Gauche","%"],["dyn_report","Report LFI","%"],
            ["dyn_dpart","Δ Participation"," pts"],["dyn_perte","Perte gauche","%"],
            ["abst","Abstention (stock)"," voix"],["rev","Revenu","€"],["pauv","Pauvreté","%"]];
// scrutins comparés par le sélecteur de réservoir (report / différentiel / taux de perte)
let selA="P22", selB="E24";
const scLab=c=>(SCR.find(s=>s[0]===c)||[,c])[1];
// seuils de zoom pour descendre/remonter automatiquement, par profondeur affichée
const ZIN=[6.6,8.2,10.6], ZOUT=[0,6.1,7.9,10.1];
const $=id=>document.getElementById(id);
const map=L.map('map',{zoomControl:true,preferCanvas:true}).fitBounds(FRANCE);
window.__map=map;
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  {attribution:'© OpenStreetMap, © CARTO',subdomains:'abcd',maxZoom:19}).addTo(map);

const cache={}; let layer=null, stack=[], indicKey="lfi_E24", indicLabel="Vote LFI", indicUnit="%",
    curVals={}, busy=false, sousMode="bv";
const fmtVal=(v,u)=> v==null?"—":(u==="€"?Math.round(v).toLocaleString('fr')+" €":
  (u===" voix"?Math.round(v).toLocaleString('fr')+" voix":v+(u||"")));

async function getJSON(p){ if(p in cache)return cache[p];
  $("loading").textContent="…"; let j=null;
  try{const r=await fetch(BASE+"/"+p); j=r.ok?await r.json():null;}catch(e){j=null;}
  cache[p]=j; $("loading").textContent=""; return j; }
const depOf=c=>c.startsWith("97")?c.slice(0,3):c.slice(0,2);

// Coloration par RANG (percentile) parmi les zones affichées : les couleurs
// s'étalent sur toute la distribution (chaque zone ayant une valeur est colorée).
// Le centre (blanc) = la médiane des zones ; bleu = plus faible, rouge = plus élevé.
function colorer(vals){ const xs=vals.filter(v=>v!=null&&!isNaN(v)).sort((a,b)=>a-b);
  if(!xs.length)return()=>"#3a3a3a";
  const n=xs.length, s=["#2166ac","#67a9cf","#f7f7f7","#ef8a62","#b2182b"];
  const rang=v=>{ let lo=0,hi=n; while(lo<hi){const md=(lo+hi)>>1; xs[md]<v?lo=md+1:hi=md;}
    let hi2=lo; while(hi2<n&&xs[hi2]===v)hi2++; return ((lo+hi2)/2)/n; };
  return v=>{ if(v==null||isNaN(v))return"#3a3a3a";
    const x=rang(v)*(s.length-1),i=Math.floor(x); return (x-i)<.5||i+1>=s.length?s[i]:s[i+1]; }; }
// Réservoirs entre les deux scrutins choisis (A→B), recalculés à la volée à partir des
// voix réelles bakées (lfiv_*, gv_*) et de la participation — mêmes formules que
// indicators.reservoirs : report = voixB/voixA, perte gauche = (voixA−voixB)/voixA,
// différentiel de participation = part B − part A (points).
function pairMetrics(o){ if(!o)return {};
  const lvA=o[`lfiv_${selA}`], lvB=o[`lfiv_${selB}`], gvA=o[`gv_${selA}`], gvB=o[`gv_${selB}`],
        pA=o[`part_${selA}`], pB=o[`part_${selB}`];
  return {
    report: lvA?Math.round(1000*lvB/lvA)/10:null,
    perte:  gvA?Math.round(1000*(gvA-gvB)/gvA)/10:null,
    dpart:  (pA!=null&&pB!=null)?Math.round((pB-pA)*10)/10:null };
}
// Les autres valeurs sont bakées par prep_bake.py et lues telles quelles.
function rawVal(o,k){ if(!o)return null;
  if(k==="dyn_report")return pairMetrics(o).report;
  if(k==="dyn_dpart") return pairMetrics(o).dpart;
  if(k==="dyn_perte") return pairMetrics(o).perte;
  return o[k]; }
const valOf=p=>rawVal(curVals[p.__code],indicKey);

// Fiche claire : tous les chiffres clés du rapport. Chaque section est dépliable
// (clic) pour révéler comment le chiffre est calculé, ses dates et sa source.
function infoPanel(nom,o){ const info=$("info");
  if(!o){info.style.display="none";return;}
  const w=(v,max)=>v==null?0:Math.max(2,Math.min(100,v/max*100));
  const barRow=(lab,v,col,max=50)=> v==null?"":
    `<div class="lab"><span>${lab}</span><b>${v} %</b></div>`+
    `<div class="bar"><i style="width:${w(v,max)}%;background:${col}"></i></div>`;
  // bloc dépliable : entête cliquable + détail caché révélant le calcul
  const exp=(body,det)=> det?
    `<div class="exp"><div class="exph">${body}<span class="ico">détails ▾</span></div><div class="det">${det}</div></div>`
    : `<div class="exp">${body}</div>`;
  const sec=t=>`<div class="sec">${t}</div>`;

  const lfi=o.lfi_E24!=null?o.lfi_E24:(o.lfi_L24!=null?o.lfi_L24:o.lfi_P22);
  let h=`<div class="t">${nom}</div>`;
  h+=exp(`<div class="lead">Vote LFI · Europ. 2024</div>`+
         `<div class="head">${lfi==null?"—":lfi+" %"}<small> des inscrits</small></div>`,
    `Part des inscrits ayant voté pour la liste LFI / Union de la gauche aux <b>européennes de juin 2024</b>. `+
    `On rapporte aux <b>inscrits</b> (et non aux votants) pour mesurer le poids réel sur le corps électoral. `+
    `Source : Ministère de l'Intérieur.`);

  if(SCR.some(([sc])=>o[`lfi_${sc}`]!=null)){
    h+=exp(sec("Évolution du vote LFI")+`<div class="trend">`+
      SCR.map(([sc,lab])=>{const v=o[`lfi_${sc}`];
        return `<div class="tcol"><div class="tbarwrap"><div class="tbar" style="height:${w(v,45)}%"></div></div>`+
               `<div class="tv">${v==null?"·":v}</div><div>${lab.split(' ')[0]}</div></div>`;}).join("")+`</div>`,
      `Vote LFI en % des inscrits à chaque scrutin : <b>Présid.</b> avril 2022 (voix Mélenchon, 1<sup>er</sup> tour) · `+
      `<b>Europ.</b> juin 2024 · <b>Légis.</b> juin 2024 (1<sup>er</sup> tour) · <b>Munic.</b> mars 2026 (1<sup>er</sup> tour, `+
      `là où disponible). « · » = donnée indisponible.`); }

  if(o.part_E24!=null){ const abst=Math.round((100-o.part_E24)*10)/10;
    h+=exp(sec("Participation · Europ. 2024")+barRow("Participation",o.part_E24,"#2e8b57",100)+
      `<div class="row"><span>Abstention</span><b>${abst} %</b></div>`,
      `<b>Participation</b> = votants ÷ inscrits aux européennes de juin 2024. `+
      `<b>Abstention</b> = 100 − participation = part des inscrits qui ne se sont pas déplacés.`); }

  if([o.gauche_E24,o.em_E24,o.lr_E24,o.rn_E24].some(v=>v!=null)){
    h+=exp(sec("Rapport de force · Europ. 2024")+
      barRow("Gauche (LFI-PS-EELV-PCF)",o.gauche_E24,"#cf2e5b")+
      barRow("Macron (Renaissance)",o.em_E24,"#e6902e")+
      barRow("Droite (LR)",o.lr_E24,"#3b6ea5")+
      barRow("RN / extrême droite",o.rn_E24,"#1f3a63"),
      `Poids de chaque bloc en <b>% des inscrits</b> aux européennes 2024. `+
      `<b>Gauche</b> = LFI + PS + EELV + PCF + divers gauche. <b>Macron</b> = Renaissance / MoDem / Horizons. `+
      `<b>Droite</b> = LR + divers droite. <b>RN</b> = RN + Reconquête + extrême droite.`); }

  // tableau de recomposition (slide 23) : 1 ligne / scrutin × 6 blocs + Abs., % inscrits
  if(window.__scr&&o.rec){
    const heads=["FI","PS","EM","LR","RN","Div","Abs"],
      cols=["#cf2e5b","#c2348b","#e6902e","#3b6ea5","#1f3a63","#8a8a8a","#666"];
    let rows="";
    window.__scr.forEach((s,i)=>{ const r=o.rec[i]; if(!r)return;
      rows+=`<tr><td class="sc" title="${s.l}">${s.c}</td>`+
        r.map(v=>`<td>${v==null?"·":v}</td>`).join("")+`</tr>`; });
    if(rows)h+=exp(sec("Recomposition · % des inscrits")+
      `<div class="rwrap"><table class="recompo"><thead><tr><th></th>`+
      heads.map((x,j)=>`<th style="color:${cols[j]}">${x}</th>`).join("")+
      `</tr></thead><tbody>${rows}</tbody></table></div>`,
      `Tableau de <b>recomposition</b> (slide 23) : poids de chaque bloc en % des inscrits, scrutin par `+
      `scrutin (2012→2026). <b>FI</b> = LFI-PCF-EXG · <b>PS</b> = PS-EELV · <b>EM</b> = MoDem-Renaissance · `+
      `<b>LR</b> = LR-DVD · <b>RN</b> = RN-EXD · <b>Div</b> = autres · <b>Abs</b> = abstention. `+
      `« · » = scrutin non disponible ici.`); }

  // réservoirs de voix : valeurs bakées (prep_bake.py), lues telles quelles
  let resHTML="";
  if(o.rep_lfi!=null){ const perte=Math.round((100-o.rep_lfi)*10)/10;
    resHTML+=`<div class="row"><span>Report LFI 2022→2024</span><b>${o.rep_lfi} %</b></div>`+
      `<div class="det2">LFI a conservé <b>${o.rep_lfi}%</b> de ses voix entre la présidentielle 2022 et les `+
      `européennes 2024${perte>0?` (soit <b>${perte}%</b> de voix insoumises perdues à reconquérir)`:""}. `+
      `Taux de report en <b>voix réelles</b> (voix LFI E2024 ÷ voix Mélenchon P2022), non en % d'inscrits.</div>`; }
  if(o.rep_lfi_em!=null){
    resHTML+=`<div class="row"><span>Report LFI 2024→2026</span><b>${o.rep_lfi_em} %</b></div>`+
      `<div class="det2">Voix LFI conservées entre les européennes 2024 et les municipales 2026 `+
      `(voix M2026 ÷ voix E2024). Disponible là où LFI était présente aux deux scrutins.</div>`; }
  if(o.dpart!=null){ const baisse=Math.round((100-o.dpart)*10)/10;
    resHTML+=`<div class="row"><span>Différentiel participation 2022→2024</span><b>${o.dpart} %</b></div>`+
      `<div class="det2">La participation aux européennes 2024 représente <b>${o.dpart}%</b> de celle de la `+
      `présidentielle 2022${baisse>0?` (recul de <b>${baisse}%</b>)`:""}. Mesure l'ampleur de la démobilisation.</div>`; }
  if(o.abst!=null){
    resHTML+=`<div class="row"><span>Abstention mobilisable (stock)</span><b>${o.abst.toLocaleString('fr')} voix</b></div>`+
      `<div class="det2">Nombre d'inscrits n'ayant pas voté aux européennes 2024 `+
      `(inscrits × taux d'abstention). Réservoir brut de voix à ramener aux urnes.</div>`; }
  if(resHTML)h+=exp(sec("Réservoirs de voix")+resHTML,
    `Le « réservoir » mesure les voix à aller chercher : les électeurs <b>insoumis</b> non reconfirmés d'un `+
    `scrutin à l'autre (taux de report en voix réelles) et les <b>abstentionnistes</b> (stock d'inscrits non votants).`);

  const s=[];
  if(o.rev!=null)s.push(["Revenu médian",o.rev.toLocaleString('fr')+" €"]);
  if(o.pauv!=null)s.push(["Taux de pauvreté",o.pauv+" %"]);
  if(s.length)h+=exp(sec("Contexte social")+
    s.map(x=>`<div class="row"><span>${x[0]}</span><b>${x[1]}</b></div>`).join(""),
    `<b>Revenu médian</b> disponible par unité de consommation et <b>taux de pauvreté</b> (part sous le seuil de `+
    `pauvreté). Source : INSEE FILOSOFI 2021, à la commune (ou à l'IRIS en vue quartiers).`);
  h+=actionPanel(o);
  info.innerHTML=h; info.style.display="block"; }

// Pont « de la carte à l'action » (slide 51) : traduit le profil de la zone en
// recommandations de terrain, rappelle la composition des blocs et invite à
// confronter les chiffres à la connaissance des militant·es.
function actionPanel(o){ if(!o)return "";
  const tips=[], abst=o.part_E24==null?null:Math.round(100-o.part_E24),
    recon=(o.lfi_P22!=null&&o.lfi_E24!=null)?Math.round((o.lfi_P22-o.lfi_E24)*10)/10:null;
  if(abst!=null&&abst>=50)
    tips.push(`Abstention massive (<b>${abst}%</b>) : la priorité est de <b>ramener aux urnes</b> avant de convaincre — ciblez les inscrits non-votants.`);
  else if(abst!=null&&abst>=40)
    tips.push(`Forte abstention (<b>${abst}%</b>) : gros réservoir de remobilisation, porte-à-porte civique.`);
  if(recon!=null&&recon>=5)
    tips.push(`<b>${recon} pts</b> d'insoumis de 2022 non remobilisés en 2024 : <b>renouer le contact</b>, ils nous connaissent déjà.`);
  if(o.pauv!=null&&o.pauv>=20)
    tips.push(`Pauvreté élevée (<b>${o.pauv}%</b>), souvent quartier dense / logement social : <b>le porte-à-porte y est le plus efficace</b>.`);
  if(!tips.length)
    tips.push(`Pas de réservoir dominant : combinez mobilisation des abstentionnistes et conviction, en vous appuyant sur le terrain.`);
  const dot=(c,n,d)=>`<div><span class="dot" style="background:${c}"></span><b>${n}</b> — ${d}</div>`;
  return `<div class="act"><div class="ah">🎯 De la carte à l'action</div>`+
    `<ul>${tips.map(t=>`<li>${t}</li>`).join("")}</ul>`+
    `<div class="leg">Blocs : `+
      dot("#cf2e5b","Gauche","LFI · PS · EELV · PCF")+dot("#e6902e","Macron","Renaissance · MoDem · Horizons")+
      dot("#3b6ea5","Droite","LR · divers droite")+dot("#1f3a63","RN / ED","RN · Reconquête")+`</div>`+
    `<div class="inv">Ces chiffres ne remplacent pas le terrain : confrontez-les à ce que vous savez de la commune `+
    `(présence militante, marché, vie associative, traditions locales).</div></div>`; }

function dessiner(geo,valeurs,codeProp,nameProp,enter){
  if(layer)layer.remove(); curVals=valeurs;
  geo.features.forEach(f=>{f.properties.__code=String(f.properties[codeProp]);
    f.properties.__nom=f.properties[nameProp]||f.properties.__code;});
  const fc=colorer(geo.features.map(f=>valOf(f.properties)));
  layer=L.geoJSON(geo,{style:f=>({fillColor:fc(valOf(f.properties)),color:"#1a1a1a",weight:.5,fillOpacity:.85}),
    onEachFeature:(f,ly)=>{ const v=valOf(f.properties);
      ly.bindTooltip(`<b>${f.properties.__nom}</b><br>${indicLabel} : ${fmtVal(v,indicUnit)}`,{sticky:true});
      ly.on("mouseover",()=>ly.setStyle({weight:2.4,color:"#fff"}));
      ly.on("mouseout",()=>layer.resetStyle(ly));
      if(enter){ ly.__enter=()=>enter(f,ly);
        ly.on("click",()=>{infoPanel(f.properties.__nom,valeurs[f.properties.__code]);enter(f,ly);}); }
      else ly.on("click",()=>infoPanel(f.properties.__nom,valeurs[f.properties.__code])); }}).addTo(map); }

function jumpTo(d){ stack=stack.slice(0,d); infoPanel(null); setFil();
  if(d===0)return vueFrance(); const t=stack[d-1]; flyTo(t.bounds); render(t.niveau,t.code); }
function setFil(){ let h=`<span class="crumb" data-d="0">🇫🇷 France</span>`;
  stack.forEach((s,i)=>h+=` › <span class="crumb" data-d="${i+1}">${s.nom}</span>`);
  $("fil").innerHTML=h; $("fil").querySelectorAll(".crumb").forEach(e=>e.onclick=()=>jumpTo(+e.dataset.d));
  $("back").disabled=stack.length===0; }

function flyTo(b,maxZoom){ if(!b)return; busy=true; map.flyToBounds(b,{duration:.8,maxZoom:maxZoom||11});
  map.once("moveend",()=>setTimeout(()=>busy=false,200)); }

async function vueFrance(){ stack=[]; setFil(); subToggle(false); flyTo(FRANCE,6);
  dessiner(await getJSON("geo/regions.geojson"),await getJSON("values/region.json"),"code","nom",
    (f,ly)=>entrer("region",f.properties.__code,f.properties.__nom,ly.getBounds())); }
async function vueRegion(code){ subToggle(false);
  const [geo,val,hier]=await Promise.all([getJSON("geo/departements.geojson"),
    getJSON("values/departement.json"),getJSON("values/_hierarchie.json")]);
  const deps=new Set(hier.departements.filter(d=>d.region===code).map(d=>d.code));
  dessiner({type:"FeatureCollection",features:geo.features.filter(f=>deps.has(String(f.properties.code)))},
    val,"code","nom",(f,ly)=>entrer("departement",f.properties.__code,f.properties.__nom,ly.getBounds())); }
async function vueDepartement(code){ subToggle(false);
  const [geo,val]=await Promise.all([getJSON(`geo/communes/${code}.geojson`),getJSON(`values/commune/${code}.json`)]);
  if(!geo){$("loading").textContent="contours indisponibles";return;}
  dessiner(geo,val||{},"code","nom",(f,ly)=>entrer("commune",f.properties.__code,f.properties.__nom,ly.getBounds())); }
const subToggle=show=>{$("subtoggle").style.display=show?"flex":"none";};
async function vueCommune(code){ const dep=depOf(code); subToggle(true);
  if(sousMode==="iris"){
    const [geo,val]=await Promise.all([getJSON(`geo/iris/${dep}.geojson`),getJSON("values/iris.json")]);
    if(!geo){$("loading").textContent="contours IRIS indisponibles";return;}
    const fc={type:"FeatureCollection",features:geo.features.filter(f=>String(f.properties.code_iris).slice(0,5)===code)};
    if(!fc.features.length){$("loading").textContent="pas d'IRIS";return;}
    dessiner(fc,val||{},"code_iris","nom_iris",null); return; }
  const [geo,val]=await Promise.all([getJSON(`geo/bv/${dep}.geojson`),getJSON(`values/bv/${dep}.json`)]);
  if(!geo){$("loading").textContent="contours BV indisponibles";return;}
  const fc={type:"FeatureCollection",features:geo.features.filter(f=>String(f.properties.code_commune)===code)};
  if(!fc.features.length){$("loading").textContent="pas de bureaux";return;}
  dessiner(fc,val||{},"bureau","bureau",null); }

function render(n,c){ if(n==="region")vueRegion(c);else if(n==="departement")vueDepartement(c);
  else if(n==="commune")vueCommune(c); }
function entrer(niveau,code,nom,bounds){ stack.push({niveau,code,nom,bounds}); setFil();
  flyTo(bounds,niveau==="commune"?15:11); setTimeout(()=>render(niveau,code),320); }
$("back").onclick=()=>jumpTo(stack.length-1);

// zoom-molette = descendre/remonter automatiquement
function featureAuCentre(){ if(!layer)return null; const c=map.getCenter(); let best=null,ba=1e18;
  layer.eachLayer(ly=>{ if(ly.getBounds){const b=ly.getBounds(); if(b.contains(c)){
    const a=(b.getEast()-b.getWest())*(b.getNorth()-b.getSouth()); if(a<ba){ba=a;best=ly;}}}}); return best; }
map.on("zoomend",()=>{ if(busy)return; const z=map.getZoom(), d=stack.length;
  if(d<3 && ZIN[d]!=null && z>=ZIN[d]){ const f=featureAuCentre(); if(f&&f.__enter)f.__enter(); }
  else if(d>=1 && z<=ZOUT[d]){ jumpTo(d-1); } });

// pastilles d'indicateurs (pas de menu déroulant)
function setIndic(k){ const p=PAST.find(x=>x[0]===k); if(!p)return;
  indicKey=p[0]; indicLabel=p[1]; indicUnit=p[2]||""; $("legtitle").textContent=p[1];
  $("pastilles").querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x.dataset.k===k)); }
function buildPastilles(){ const box=$("pastilles");
  PAST.forEach(([k,lab])=>{ const c=document.createElement("span"); c.className="chip"+(k===indicKey?" on":"");
    c.textContent=lab; c.dataset.k=k;
    c.onclick=()=>{ setIndic(k); const t=stack[stack.length-1]; t?render(t.niveau,t.code):vueFrance(); };
    box.appendChild(c); }); $("legtitle").textContent=indicLabel; }
// bascule Bureaux de vote ⇄ Quartiers IRIS (au niveau commune)
$("subtoggle").querySelectorAll(".chip").forEach(c=>c.onclick=()=>{ const m=c.dataset.m; if(m===sousMode)return;
  sousMode=m; $("subtoggle").querySelectorAll(".chip").forEach(x=>x.classList.toggle("on",x.dataset.m===m));
  const socio=indicKey==="rev"||indicKey==="pauv";
  if(m==="iris"&&!socio)setIndic("rev"); else if(m==="bv"&&socio)setIndic("lfi_E24");
  const t=stack[stack.length-1]; if(t&&t.niveau==="commune")vueCommune(t.code); });
// déplier le détail d'une section de la fiche
$("info").addEventListener("click",e=>{ const h=e.target.closest(".exph"); if(h)h.parentElement.classList.toggle("open"); });

async function initSearch(){ const idx=await getJSON("values/communes_index.json"); if(!idx)return;
  $("search").__idx=idx; const dl=$("communes");
  idx.slice(0,8000).forEach(c=>{const o=document.createElement("option");o.value=`${c.nom} · ${c.code}`;dl.appendChild(o);}); }
$("search").addEventListener("change",async()=>{
  const m=$("search").value.match(/(\d[\dAB]\d{3})\s*$/i); if(!m)return;
  const code=m[1].toUpperCase(),idx=$("search").__idx||[],c=idx.find(x=>x.code===code); if(!c)return;
  stack=[{niveau:"region",code:c.region,nom:c.region,bounds:null},
         {niveau:"departement",code:c.dep,nom:c.dep,bounds:null}];
  await vueCommune(code); stack.push({niveau:"commune",code,nom:c.nom}); setFil();
  const cv=await getJSON(`values/commune/${c.dep}.json`); infoPanel(c.nom,(cv||{})[code]);
  const b=layer&&layer.getBounds&&layer.getBounds(); if(b&&b.isValid())flyTo(b,15); });

async function init(){ buildPastilles(); window.__scr=await getJSON("values/_scrutins.json"); await initSearch(); vueFrance(); }
init();
</script>
</body>
